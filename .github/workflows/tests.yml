name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: prompt_admin_test
          POSTGRES_USER: prompt_admin
          POSTGRES_PASSWORD: prompt_admin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prompt_admin -d prompt_admin_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: prompt_admin_test
      POSTGRES_USER: prompt_admin
      POSTGRES_PASSWORD: prompt_admin_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run test suite
        id: test_suite
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p "test_*.py" \
            2>&1 | tee test-output.log

      - name: Upload failed test output
        if: failure() && steps.test_suite.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
          retention-days: 3

      - name: Build Docker image
        run: docker build --tag prompt-admin:test .

      - name: Start concurrent images against empty PostgreSQL
        run: |
          docker run --detach \
            --name prompt-admin-test-1 \
            --network host \
            --env POSTGRES_HOST=127.0.0.1 \
            --env POSTGRES_PORT=5432 \
            --env POSTGRES_DB=prompt_admin_test \
            --env POSTGRES_USER=prompt_admin \
            --env POSTGRES_PASSWORD=prompt_admin_test \
            --env PROMPT_ADMIN_HOST=127.0.0.1 \
            --env PROMPT_ADMIN_PORT=8090 \
            prompt-admin:test
          docker run --detach \
            --name prompt-admin-test-2 \
            --network host \
            --env POSTGRES_HOST=127.0.0.1 \
            --env POSTGRES_PORT=5432 \
            --env POSTGRES_DB=prompt_admin_test \
            --env POSTGRES_USER=prompt_admin \
            --env POSTGRES_PASSWORD=prompt_admin_test \
            --env PROMPT_ADMIN_HOST=127.0.0.1 \
            --env PROMPT_ADMIN_PORT=8091 \
            prompt-admin:test

      - name: Verify concurrent Docker health endpoints
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8090/healthz \
              && curl --fail --silent http://127.0.0.1:8091/healthz; then
              exit 0
            fi
            sleep 1
          done
          docker logs prompt-admin-test-1
          docker logs prompt-admin-test-2
          exit 1

      - name: Stop Docker smoke-test containers
        if: always()
        run: |
          docker rm --force prompt-admin-test-1 || true
          docker rm --force prompt-admin-test-2 || true
